services:
  postgres:
    profiles: ["local-test"]
    image: postgres:16-alpine
    container_name: ${LOCAL_POSTGRES_CONTAINER_NAME:-claude-code-hub-db-local}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-claude_code_hub}
    ports:
      - "${LOCAL_POSTGRES_BIND_IP:-127.0.0.1}:${LOCAL_POSTGRES_PORT:-35432}:5432"
    volumes:
      - local-postgres-data:/var/lib/postgresql/data
      - ./docker/local-test/init-postgres.sql:/docker-entrypoint-initdb.d/01-init-postgres.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_POSTGRES_USER:-postgres} -d ${LOCAL_POSTGRES_DB:-claude_code_hub}"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - claude-code-hub-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
    image: ${IMAGE_NAME:-ghcr.io/hashmapw/claude-code-hub-quota-monitor}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-claude-code-hub-quota-monitor}
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - claude-code-hub-net
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:${HOST_PORT:-23010}:${CONTAINER_PORT:-3010}"
    environment:
      PORT: ${CONTAINER_PORT:-3010}
      MONITOR_DSN: ${MONITOR_DSN:?MONITOR_DSN is required}
      MONITOR_ADMIN_PASSWORD: ${MONITOR_ADMIN_PASSWORD:?MONITOR_ADMIN_PASSWORD is required}
      MONITOR_PROVIDER_SCHEMA: ${MONITOR_PROVIDER_SCHEMA:-public}
      MONITOR_PROVIDER_TABLE: ${MONITOR_PROVIDER_TABLE:-providers}
      MONITOR_SETTINGS_DB_PATH: ${MONITOR_SETTINGS_DB_PATH:-/app/data/provider-settings.sqlite}
      MONITOR_SQLITE_SEED_PATH: ${MONITOR_SQLITE_SEED_PATH:-/app-seed/provider-settings.sqlite}
      MONITOR_SQLITE_IMPORT_MODE: ${MONITOR_SQLITE_IMPORT_MODE:-if-missing}
      MONITOR_CACHE_TTL_MS: ${MONITOR_CACHE_TTL_MS:-60000}
      MONITOR_RESULT_CACHE_TTL_SEC: ${MONITOR_RESULT_CACHE_TTL_SEC:-604800}
      MONITOR_REDIS_URL: ${MONITOR_REDIS_URL:-}
      MONITOR_REDIS_TLS_REJECT_UNAUTHORIZED: ${MONITOR_REDIS_TLS_REJECT_UNAUTHORIZED:-true}
      MONITOR_PROXY_URL: ${MONITOR_PROXY_URL:-}
      MONITOR_LOG_LEVEL: ${MONITOR_LOG_LEVEL:-info}
      MONITOR_DEBUG_HTTP: ${MONITOR_DEBUG_HTTP:-false}
    volumes:
      - ${DATA_SOURCE:-./data}:/app/data
      - ${SQLITE_SEED_ROOT:-.}:/app-seed:ro

networks:
  claude-code-hub-net:
    external: true
    name: ${HUB_EXTERNAL_NETWORK:-claude-code-hub-net-3gct}

volumes:
  app-data:
  local-postgres-data:
